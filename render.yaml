databases:
  - name: polycraft-db
    databaseName: polycraft
    user: polycraft
    plan: free

services:
  - type: web
    name: polycraft-server
    env: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install && npm run prisma:generate && npm run prisma:push && npm run seed
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: polycraft-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://polycraft-client.onrender.com

  - type: web
    name: polycraft-client
    env: static
    plan: free
    region: oregon
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://polycraft-server.onrender.com
